name: Python SDK

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/python/**"
      - "src/core/**"
      - "package.json"
      - ".github/workflows/python.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          # Cargo.toml is under src/python/wasm-host/, not at the repo root.
          cache-workspaces: "src/python/wasm-host -> target"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install JS deps
        run: bun install

      - name: Build core.wasm
        run: bun run build:wasm:python

      - name: Create Python venv
        # maturin develop refuses a bare system Python; provide a venv and
        # export it so subsequent steps (pip install, pytest) share it.
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install flash_agents_wasm Rust host
        working-directory: src/python/wasm-host
        run: |
          python -m pip install --upgrade pip maturin
          maturin develop --release

      - name: Install flash-agents editable
        working-directory: src/python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: src/python
        run: pytest -v
