name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      # setup-node is still required so npm publish picks up the registry
      # URL and NODE_AUTH_TOKEN. Bun handles install/build/test.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - run: npm publish --provenance --access public

  python-wasm-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python build tooling
        run: python -m pip install --upgrade pip "maturin[zig]"
      - name: Build native WASM host wheel
        run: |
          python -m maturin build \
            --manifest-path src/python/wasm-host/Cargo.toml \
            --release \
            --target ${{ matrix.target }} \
            --zig \
            --compatibility manylinux2014 \
            --out python-dist
      - name: Upload native WASM host wheel
        uses: actions/upload-artifact@v4
        with:
          name: flash-agents-wasm-${{ matrix.target }}
          path: python-dist/flash_agents_wasm-*.whl

  python-sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JS dependencies
        run: bun install --frozen-lockfile
      - name: Build WASM core
        run: bun run build:wasm:python
      - name: Install Python build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build Python SDK wheel and sdist
        working-directory: src/python
        run: python -m build --outdir ../../python-dist
      - name: Upload Python release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flash-agents-sdk
          path: python-dist/flash_agents-*
