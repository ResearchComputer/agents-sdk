name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run lint
      - name: Test with coverage
        run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JS dependencies
        run: bun install --frozen-lockfile
      - name: Build WASM core
        run: bun run build:wasm:python
      - name: Install Python build tooling
        run: python -m pip install --upgrade pip maturin
      - name: Build native WASM host extension
        working-directory: src/python/wasm-host
        run: maturin develop --release
      - name: Install Python SDK
        working-directory: src/python
        run: python -m pip install -e ".[dev]"
      - name: Run Python tests
        working-directory: src/python
        run: python -m pytest -q
